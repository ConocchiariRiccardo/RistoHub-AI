      <[errore]>

      <form action="./registrazione.php" method="POST" class="auth-form">

          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="min. 8 caratteri" required>

          <input type="password" id="conferma_password" name="conferma_password" placeholder="ripeti la password" required>
